name: release-beta

on:
  push:
    tags:
      - "*/*-beta"
      - "*/*-beta.*"

jobs:
  publish-beta:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24.8.0"

      - name: Enable corepack pnpm
        run: corepack enable

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Validate beta tag
        id: release
        run: node scripts/release/validate-tag.mjs beta

      - name: Publish beta package to JSR
        working-directory: ${{ steps.release.outputs.package_dir }}
        run: pnpm dlx jsr publish
