name: release-beta

on:
  push:
    tags:
      - "*/*-beta"
      - "*/*-beta.*"

jobs:
  publish-beta:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24.8.0"
          registry-url: "https://npm.pkg.github.com"
          scope: "@liberte-top"

      - name: Enable corepack pnpm
        run: corepack enable

      - name: Install workspace dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Validate beta tag
        id: release
        run: node scripts/release/validate-tag.mjs beta

      - name: Publish beta package to GitHub Packages
        working-directory: ${{ steps.release.outputs.package_dir }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish --tag beta
